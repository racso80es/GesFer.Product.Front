name: PR Validation Protocol

on:
  pull_request:
    branches: [ "master", "main" ]

jobs:
  verify-protocol:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: src/package-lock.json

    - name: Install dependencies
      working-directory: src
      run: npm ci

    - name: Validate Nomenclature
      shell: pwsh
      env:
        GITHUB_HEAD_REF: ${{ github.head_ref }}
      run: ./scripts/validate-nomenclatura.ps1 -BaseBranch origin/${{ github.base_ref }}

    - name: Lint
      working-directory: src
      run: npm run lint

    - name: Build
      working-directory: src
      run: npm run build

    - name: Test
      working-directory: src
      run: npm run test

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: SddIA evolution validate
      shell: bash
      run: |
        set -e
        git fetch origin "${{ github.base_ref }}" || true
        if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -qE '^SddIA/'; then
          cargo build --release --manifest-path scripts/skills-rs/Cargo.toml --bin sddia_evolution_validate
          ./scripts/skills-rs/target/release/sddia_evolution_validate --base "origin/${{ github.base_ref }}" --head HEAD --output-json
        fi
